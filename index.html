<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly ZIP Market Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f4;color:#1a1a1a;padding:0}
header{background:#1a1a1a;color:#fff;padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:12px;height:52px;position:sticky;top:0;z-index:200}
header h1{font-size:15px;font-weight:600;white-space:nowrap}
header span{font-size:12px;color:#aaa}
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #e0e0e0;padding:0 1rem;gap:0}
.tab{flex-shrink:0;padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.tab-add{padding:10px 14px;font-size:18px;color:#bbb;cursor:pointer;border-bottom:2px solid transparent}
.tab-add:hover{color:#1a1a1a}
.page{display:none;padding:1rem}
.page.active{display:block}

/* Dashboard */
.zip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:1.5rem}
.zip-card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:1.25rem;cursor:pointer;transition:border-color 0.15s}
.zip-card:hover{border-color:#888}
.zip-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.zip-num{font-size:22px;font-weight:700;color:#1a1a1a}
.zip-role{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.role-1{background:#FFF3CD;color:#856404}
.role-2{background:#D1ECF1;color:#0c5460}
.role-3{background:#F8D7DA;color:#721c24}
.role-4{background:#D4EDDA;color:#155724}
.zip-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-mini{background:#f8f8f8;border-radius:8px;padding:8px 10px}
.metric-mini-label{font-size:10px;color:#888;margin-bottom:2px}
.metric-mini-val{font-size:15px;font-weight:600;color:#1a1a1a}
.metric-mini-val.up{color:#1e8449}
.metric-mini-val.down{color:#c0392b}
.metric-mini-val.warn{color:#d4ac0d}
.zip-updated{font-size:11px;color:#bbb;margin-top:10px}
.score-bar-wrap{margin-top:10px}
.score-bar-label{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px}
.score-bar-track{background:#eee;border-radius:4px;height:6px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;background:#1a1a1a;transition:width 0.4s}
.no-zips{text-align:center;padding:3rem 1rem;color:#aaa;font-size:14px}

/* Ranking */
.rank-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0}
.rank-table th{font-size:11px;color:#888;font-weight:500;padding:10px 14px;border-bottom:1px solid #f0f0f0;text-align:left}
.rank-table td{padding:12px 14px;border-bottom:1px solid #f8f8f8;font-size:13px;vertical-align:middle}
.rank-table tr:last-child td{border-bottom:none}
.rank-medal{font-size:18px;width:28px}
.rank-zip{font-size:15px;font-weight:700}
.rank-score{font-size:18px;font-weight:700}
.strategy-box{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:1.25rem;margin-top:12px}
.strategy-box h3{font-size:13px;font-weight:600;margin-bottom:10px;color:#1a1a1a}
.strat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.strat-pct{font-size:13px;font-weight:700;min-width:36px;color:#1a1a1a}
.strat-bar-track{flex:1;background:#eee;border-radius:4px;height:8px;overflow:hidden}
.strat-bar-fill{height:100%;border-radius:4px}
.strat-zip{font-size:12px;color:#666;min-width:44px}

/* Detail page */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#666;cursor:pointer;margin-bottom:1rem;border:1px solid #e0e0e0;background:#fff;border-radius:8px;padding:6px 12px}
.back-btn:hover{color:#1a1a1a}
.detail-header{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:1.25rem;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.detail-zip{font-size:28px;font-weight:700}
.detail-role{font-size:13px;color:#888}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:12px}
.metric-card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:1rem}
.metric-label{font-size:11px;color:#888;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:700;color:#1a1a1a}
.metric-value.good{color:#1e8449}
.metric-value.warn{color:#d4ac0d}
.metric-value.bad{color:#c0392b}
.metric-sub{font-size:11px;color:#aaa;margin-top:2px}
.section-card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:1.25rem;margin-bottom:12px}
.section-card h3{font-size:13px;font-weight:600;margin-bottom:12px;color:#1a1a1a}
.works-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.works-box{border-radius:8px;padding:10px 12px}
.works-box.green{background:#D4EDDA}
.works-box.red{background:#F8D7DA}
.works-box h4{font-size:11px;font-weight:600;margin-bottom:6px}
.works-box h4.green{color:#155724}
.works-box h4.red{color:#721c24}
.works-item{font-size:12px;margin-bottom:3px;color:#333}
.history-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.history-row:last-child{border-bottom:none}
.history-date{color:#888;min-width:80px}
.history-val{font-weight:600;min-width:60px}
.history-change{font-size:11px}
.history-change.up{color:#1e8449}
.history-change.down{color:#c0392b}
.history-change.same{color:#aaa}
.notes-area{width:100%;border:1px solid #e0e0e0;border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;min-height:80px;color:#1a1a1a;background:#fff}
.notes-area:focus{outline:none;border-color:#888}
.save-notes-btn{margin-top:8px;font-size:12px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;padding:6px 14px;cursor:pointer}
.save-notes-btn:hover{background:#f5f5f5}

/* Add/Edit form */
.form-card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:1.25rem;margin-bottom:12px}
.form-card h3{font-size:13px;font-weight:600;margin-bottom:14px;color:#1a1a1a}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:14px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:11px;color:#888;font-weight:500}
.form-field input,.form-field select,.form-field textarea{border:1px solid #e0e0e0;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:#1a1a1a;background:#fff}
.form-field input:focus,.form-field select:focus{outline:none;border-color:#888}
.form-field textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-primary{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-primary:hover{opacity:0.85}
.btn-secondary{background:#fff;color:#1a1a1a;border:1px solid #ccc;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-secondary:hover{background:#f5f5f5}
.btn-danger{background:#fff;color:#c0392b;border:1px solid #f5c6cb;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-danger:hover{background:#FFF5F5}
.badge-distress{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;background:#F8D7DA;color:#721c24}
.badge-low{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;background:#D4EDDA;color:#155724}
.badge-mod{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;background:#FFF3CD;color:#856404}

/* SYNC BUTTON */
.sync-btn{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.65);padding:5px 12px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;white-space:nowrap}
.sync-btn:hover{background:rgba(255,255,255,0.18)}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#d4ac0d;flex-shrink:0}
.sync-dot.connected{background:#1e8449}

/* SYNC DROPDOWN */
.sync-dropdown{display:none;position:absolute;top:52px;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:0 0 12px 12px;padding:16px;width:320px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.sync-dropdown.open{display:block}
.sync-dropdown-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:10px}
.sync-dropdown input{width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;font-family:inherit;color:#1a1a1a;outline:none;margin-bottom:8px}
.sync-dropdown input:focus{border-color:#888}
.sync-dropdown-actions{display:flex;gap:8px;margin-top:4px}
.sync-connected-info{font-size:12px;color:#666;line-height:1.6}
.sync-disconnect{font-size:12px;color:#c0392b;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;margin-top:8px;display:block}
.sync-disconnect:hover{text-decoration:underline}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}


/* WEEKLY MARKET READ */
.market-read-card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:1.25rem;margin-bottom:12px}
.market-read-card h3{font-size:13px;font-weight:600;margin-bottom:14px;color:#1a1a1a}
.market-read-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.mkt-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.03em}
.mkt-hot{background:#D4EDDA;color:#155724}
.mkt-stable{background:#D1ECF1;color:#0c5460}
.mkt-slow{background:#e8e8e8;color:#555}
.mkt-early-distress{background:#FFF3CD;color:#7a4f0a}
.mkt-distress{background:#1a1a1a;color:#fff}
.action-attack{background:#1a1a1a;color:#fff}
.action-watch-retail{background:#D4EDDA;color:#155724}
.action-watch{background:#D1ECF1;color:#0c5460}
.action-watch-light{background:#FFF3CD;color:#7a4f0a}
.action-avoid{background:#e8e8e8;color:#777}
.mkt-score{font-size:26px;font-weight:700;color:#1a1a1a;line-height:1}
.mkt-score-label{font-size:11px;color:#888;margin-top:2px}
.mkt-summary{font-size:13px;color:#444;line-height:1.6;padding:10px 12px;background:#f8f8f8;border-radius:8px;margin-top:8px}
.calc-display{background:#f8f8f8;border:1px solid #e8e8e8;border-radius:8px;padding:8px 10px;font-size:13px;color:#555;font-weight:500;min-height:36px;display:flex;align-items:center}
.auto-label{font-size:10px;background:#e8f5ee;color:#155724;border-radius:10px;padding:1px 6px;font-weight:600;margin-left:4px}
.form-field label{display:flex;align-items:center;gap:4px}

/* MOBILE */
@media(max-width:640px){
  header{padding:0 12px}
  .tabs{padding:0 0.5rem}
  .tab{padding:10px 12px;font-size:12px}
  .zip-grid{grid-template-columns:1fr}
  .metrics-grid{grid-template-columns:1fr 1fr}
  .works-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr 1fr}
  .sync-dropdown{right:0;left:0;width:100%}
  .rank-table{font-size:12px}
  .rank-table th,.rank-table td{padding:8px 10px}
}
</style>
</head>
<body>

<header style="position:relative">
  <h1>📍 Weekly ZIP Market Tracker</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="hdr-date"></span>
    <button class="sync-btn" onclick="toggleSyncDropdown()" id="sync-btn">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Connect DB</span>
    </button>
  </div>

  <!-- SYNC DROPDOWN -->
  <div class="sync-dropdown" id="sync-dropdown">
    <div class="sync-dropdown-title" id="sync-dropdown-title">Connect Supabase</div>
    <div id="sync-form">
      <input id="setup-url" type="text" placeholder="Project URL (https://xxx.supabase.co)">
      <input id="setup-key" type="text" placeholder="Anon public key (eyJ...)">
      <div class="sync-dropdown-actions">
        <button class="btn-primary" style="flex:1;padding:8px;font-size:13px" onclick="connectSupabase()">Connect</button>
        <button class="btn-secondary" style="padding:8px 12px;font-size:13px" onclick="toggleSyncDropdown()">Cancel</button>
      </div>
    </div>
    <div id="sync-connected-info" style="display:none">
      <div class="sync-connected-info"><span style="color:#1e8449;font-weight:600">● Connected</span> — data syncs across all your devices automatically.</div>
      <button class="sync-disconnect" onclick="disconnectSupabase()">Disconnect</button>
    </div>
  </div>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" onclick="showPage('dashboard')">Dashboard</div>
  <div class="tab" onclick="showPage('ranking')">Rankings</div>
  <div class="tab-add" onclick="showPage('add')" title="Add zip code">+</div>
</div>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div class="zip-grid" id="zip-grid"></div>
</div>

<!-- RANKING -->
<div class="page" id="page-ranking">
  <div style="margin-bottom:12px">
    <table class="rank-table" id="rank-table"></table>
  </div>
  <div class="strategy-box">
    <h3>Suggested effort allocation</h3>
    <div id="strat-bars"></div>
  </div>
</div>

<!-- ADD ZIP -->
<div class="page" id="page-add">
  <div class="form-card">
    <h3 id="form-title">Add new zip code</h3>
    <div class="form-grid">
      <div class="form-field"><label>Zip code</label><input type="text" id="f-zip" placeholder="e.g. 40214" maxlength="5"/></div>
      <div class="form-field"><label>Role / strategy</label>
        <select id="f-role">
          <option value="Main focus">Main focus</option>
          <option value="High risk / high reward">High risk / high reward</option>
          <option value="Backup deals">Backup deals</option>
          <option value="Clean flips">Clean flips</option>
          <option value="Watching">Watching</option>
        </select>
      </div>
      <div class="form-field"><label>Active listings</label><input type="number" id="f-active" placeholder="112" oninput="autoCalc()"/></div>
      <div class="form-field"><label>Pending</label><input type="number" id="f-pending" placeholder="34" oninput="autoCalc()"/></div>
      <div class="form-field"><label>Sold (7d)</label><input type="number" id="f-sold" placeholder="39" oninput="autoCalc()"/></div>
      <div class="form-field"><label>Expired / Cancelled (7d)</label><input type="number" id="f-expired" placeholder="0" oninput="autoCalc()"/></div>
      <div class="form-field"><label>Week of (date)</label><input type="date" id="f-date"/></div>
      <div class="form-field"><label>Median days on market</label><input type="number" id="f-dom" placeholder="28"/></div>
      <div class="form-field"><label>Avg days on market</label><input type="number" id="f-dom-avg" placeholder="43"/></div>
      <div class="form-field"><label>% sold in 0–30 days</label><input type="number" id="f-fast" placeholder="61"/></div>
      <div class="form-field"><label>List-to-sale ratio (%)</label><input type="number" id="f-lsr" placeholder="99" step="0.1" oninput="autoCalc()"/></div>
      <div class="form-field"><label>Avg price drop ($)</label><input type="number" id="f-drop-amt" placeholder="13087" oninput="autoCalc()"/></div>
      <div class="form-field"><label>Avg list price ($)</label><input type="number" id="f-list-price" placeholder="264000" oninput="autoCalc()"/></div>
      <div class="form-field"><label>Avg price drop % <span class="auto-label">auto</span></label><div class="calc-display" id="f-drop-pct-disp">—</div><input type="hidden" id="f-drop-pct"/></div>
      <div class="form-field"><label>Weekly demand ratio <span class="auto-label">auto</span></label><div class="calc-display" id="f-demand-disp">—</div><input type="hidden" id="f-demand"/></div>
      <div class="form-field"><label>Competition score (1–10) <span class="auto-label">auto</span></label><div class="calc-display" id="f-comp-disp">—</div><input type="hidden" id="f-comp"/></div>
      <div class="form-field"><label>Distress level <span class="auto-label">auto</span></label><div class="calc-display" id="f-distress-disp">—</div><input type="hidden" id="f-distress" value="Moderate"/></div>
      <div class="form-field"><label>Low sale price ($)</label><input type="number" id="f-low-sale" placeholder="75000"/></div>
    </div>
    <div class="form-field" style="margin-bottom:14px"><label>What works here</label><textarea id="f-works" placeholder="Distressed deals, moderate rehabs, safer flips"></textarea></div>
    <div class="form-field" style="margin-bottom:14px"><label>What doesn't work</label><textarea id="f-doesnt" placeholder="Expecting fast flips, going too cheap"></textarea></div>
    <div class="form-field" style="margin-bottom:14px"><label>Notes / investor read</label><textarea id="f-notes" placeholder="Your analysis and weekly observations..."></textarea></div>
    <div id="weekly-market-read" style="display:none;margin-bottom:14px">
      <div class="market-read-card" style="border:1px solid #d0e8d8;background:#f8fdf9">
        <h3>📊 Weekly Market Read</h3>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <div class="market-read-top">
              <div><div class="mkt-score" id="mkt-zip-score">—</div><div class="mkt-score-label">Weekly ZIP score / 10</div></div>
              <span class="mkt-badge" id="mkt-status-badge">—</span>
              <span class="mkt-badge" id="mkt-action-badge">—</span>
            </div>
          </div>
        </div>
        <div class="mkt-summary" id="mkt-summary">Enter market data above to generate your weekly read.</div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="saveZip()">Save zip code</button>
      <button class="btn-secondary" onclick="showPage('dashboard')">Cancel</button>
      <button class="btn-danger" id="delete-btn" style="display:none" onclick="deleteZip()">Delete zip</button>
    </div>
  </div>
</div>

<!-- DETAIL -->
<div class="page" id="page-detail">
  <button class="back-btn" onclick="showPage('dashboard')">&#8592; Back</button>
  <div id="detail-content"></div>
</div>

<div id="toast"></div>

<script>
// ── SUPABASE CONFIG ──────────────────────────────────────
const SB_URL_KEY = 'ziptracker_sb_url';
const SB_KEY_KEY = 'ziptracker_sb_key';
const DB_KEY     = 'ziptracker_v2';
let sbClient = null;
let db = { zips: {} };
let editingZip = null;

// ── LOCAL STORAGE ────────────────────────────────────────
function loadLocal() {
  try { db = JSON.parse(localStorage.getItem(DB_KEY) || '{"zips":{}}'); } catch(e) { db = { zips: {} }; }
}
function saveLocal() {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
}

// ── SUPABASE INIT ────────────────────────────────────────
function getSbCreds() {
  return { url: localStorage.getItem(SB_URL_KEY)||'', key: localStorage.getItem(SB_KEY_KEY)||'' };
}
function initSupabase(url, key) {
  try { sbClient = supabase.createClient(url, key); return true; }
  catch(e) { sbClient = null; return false; }
}

// ── SYNC DROPDOWN ────────────────────────────────────────
function toggleSyncDropdown() {
  document.getElementById('sync-dropdown').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const dd = document.getElementById('sync-dropdown');
  const btn = document.getElementById('sync-btn');
  if (!dd.contains(e.target) && !btn.contains(e.target)) dd.classList.remove('open');
});

function setSyncStatus(state) {
  const dot   = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  const form  = document.getElementById('sync-form');
  const info  = document.getElementById('sync-connected-info');
  const title = document.getElementById('sync-dropdown-title');
  if (state === 'connected') {
    dot.className = 'sync-dot connected';
    label.textContent = 'Synced';
    form.style.display = 'none';
    info.style.display = 'block';
    title.textContent = 'Database connected';
  } else if (state === 'syncing') {
    dot.className = 'sync-dot';
    dot.style.background = '#d4ac0d';
    label.textContent = 'Syncing…';
  } else {
    dot.className = 'sync-dot';
    dot.style.background = '#d4ac0d';
    label.textContent = 'Connect DB';
    if (form) form.style.display = 'block';
    if (info) info.style.display = 'none';
    if (title) title.textContent = 'Connect Supabase';
  }
}

async function connectSupabase() {
  const url = document.getElementById('setup-url').value.trim();
  const key = document.getElementById('setup-key').value.trim();
  if (!url || !key) { toast('Please enter both URL and key'); return; }
  toast('Connecting...');
  if (!initSupabase(url, key)) { toast('Invalid credentials'); return; }
  const { error } = await sbClient.from('zip_tracker').select('zip').limit(1);
  if (error) { toast('Error: ' + error.message); sbClient = null; return; }
  localStorage.setItem(SB_URL_KEY, url);
  localStorage.setItem(SB_KEY_KEY, key);
  setSyncStatus('syncing');
  await loadFromSupabase();
  setSyncStatus('connected');
  toggleSyncDropdown();
  renderDashboard();
  toast('Connected! Data synced.');
}

function disconnectSupabase() {
  if (!confirm('Disconnect? Data will only save locally.')) return;
  localStorage.removeItem(SB_URL_KEY);
  localStorage.removeItem(SB_KEY_KEY);
  sbClient = null;
  setSyncStatus('disconnected');
  toast('Disconnected — using local storage');
}

// ── SUPABASE CRUD ────────────────────────────────────────
async function loadFromSupabase() {
  if (!sbClient) return;
  const { data, error } = await sbClient.from('zip_tracker').select('*');
  if (error) { toast('Sync error: ' + error.message); return; }
  // Rebuild db from flat rows
  db = { zips: {} };
  (data || []).forEach(row => {
    if (!db.zips[row.zip]) {
      db.zips[row.zip] = {
        role: row.role, distress: row.distress,
        works: row.works, doesnt: row.doesnt, notes: row.notes,
        history: []
      };
    }
    if (row.entry_data) {
      db.zips[row.zip].history.push(row.entry_data);
    }
    // Update meta from latest row
    db.zips[row.zip].role     = row.role;
    db.zips[row.zip].distress = row.distress;
    db.zips[row.zip].works    = row.works;
    db.zips[row.zip].doesnt   = row.doesnt;
    db.zips[row.zip].notes    = row.notes;
  });
  saveLocal();
}

async function upsertToSupabase(zipKey) {
  if (!sbClient) return;
  const z = db.zips[zipKey];
  const latest = z.history[z.history.length - 1];
  const { error } = await sbClient.from('zip_tracker').upsert({
    zip: zipKey,
    role: z.role, distress: z.distress,
    works: z.works, doesnt: z.doesnt, notes: z.notes,
    entry_data: latest,
    updated_at: new Date().toISOString()
  }, { onConflict: 'zip' });
  if (error) toast('Sync error: ' + error.message);
  else setSyncStatus('connected');
}

async function deleteFromSupabase(zipKey) {
  if (!sbClient) return;
  const { error } = await sbClient.from('zip_tracker').delete().eq('zip', zipKey);
  if (error) toast('Sync error: ' + error.message);
}

async function updateNotesInSupabase(zipKey) {
  if (!sbClient) return;
  await sbClient.from('zip_tracker').update({ notes: db.zips[zipKey].notes }).eq('zip', zipKey);
}

// ── WEEKLY SCORING ENGINE ────────────────────────────────
function calcWeeklyScore({ active, pending, sold, expired, domAvg, fast, lsr, dropAmt, listPrice }) {
  // ── Core ratios ───────────────────────────────────────
  const demandRatio = active > 0 ? pending / active : 0;
  const dropPct     = listPrice > 0 ? (dropAmt / listPrice) * 100 : 0;
  const expiredRate = active > 0 ? expired / active : 0;

  // ── Distress scoring (independent, weighted heavily) ──
  // expired count and rate are the primary distress signals
  const expiredDistress = expired >= 10 ? 4 : expired >= 5 ? 3 : expired >= 2 ? 1.5 : 0;
  const expiredVsSold   = (expired > 0 && sold > 0 && expired >= sold) ? 2 : (expired > sold * 0.5 ? 1 : 0);
  const dropDistress    = dropPct > 4 ? 2 : dropPct > 2 ? 1 : 0;
  const domDistress     = domAvg > 60 ? 2 : domAvg > 40 ? 1 : 0;
  const distressRaw     = expiredDistress + expiredVsSold + dropDistress + domDistress;
  const distress        = distressRaw >= 7 ? 'High' : distressRaw >= 4 ? 'Moderate' : distressRaw >= 2 ? 'Low' : 'None';

  // ── Market strength score (pure demand/velocity signal) ─
  // This measures how HOT the market is, NOT investor opportunity
  const demandScore   = Math.min(2.5, demandRatio * 2.5);
  const velocityScore = Math.min(2,   (sold / 10) * 2);
  const domScore      = domAvg > 0 ? Math.max(0, 2 - (domAvg / 45)) : 1;
  const speed30Score  = Math.min(2,   (fast / 100) * 2);
  const ltsScore      = lsr >= 100 ? 0.5 : lsr >= 98 ? 0.35 : lsr >= 95 ? 0.15 : 0;
  const strengthRaw   = demandScore + velocityScore + domScore + speed30Score + ltsScore;

  // ── Opportunity boost (distress in slow market = deals) ─
  // Low demand + high expired = investor opportunity, not a penalty
  let opportunityBoost = 0;
  if (demandRatio < 0.10 && expired >= sold && expired > 0) opportunityBoost += 1.5;
  else if (demandRatio < 0.20 && expired >= sold && expired > 0) opportunityBoost += 1.0;
  if (expired >= 5)  opportunityBoost += 0.5;
  if (expired >= 10) opportunityBoost += 0.5;
  if (dropPct > 3 && demandRatio < 0.25) opportunityBoost += 0.5;

  // ── ZIP score: strength + opportunity (no expired penalty) ─
  const rawScore = strengthRaw + opportunityBoost;
  const zipScore = Math.max(0, Math.min(10, rawScore));

  // ── Competition score (inverse of distress — lower = easier for investors) ─
  const compRaw = (demandRatio * 3) + (fast / 20) + (lsr >= 100 ? 1 : 0) - (dropPct * 0.3);
  const comp    = Math.max(1, Math.min(10, Math.round(compRaw + 3)));

  // ── Market status (5 types) ───────────────────────────
  let status;
  if (strengthRaw >= 6.5) {
    status = 'Hot';
  } else if (distressRaw >= 7 || (distressRaw >= 4 && demandRatio < 0.25)) {
    status = 'Distress';
  } else if (distressRaw >= 2 && demandRatio < 0.30) {
    status = 'Early Distress';
  } else if (strengthRaw >= 3.5) {
    status = 'Stable';
  } else {
    status = 'Slow';
  }

  // ── Recommended action ────────────────────────────────
  let action;
  if      (status === 'Hot')            action = 'Watch / Retail';
  else if (status === 'Stable')         action = 'Watch';
  else if (status === 'Early Distress') action = 'Watch / Light Attack';
  else if (status === 'Distress')       action = 'ATTACK';
  else                                  action = 'Avoid';

  // ── Summary ───────────────────────────────────────────
  const summary = generateWeeklySummary({ status, action, distress, demandRatio, sold, expired, domAvg, fast, dropPct, zipScore, opportunityBoost });

  return { demandRatio, dropPct, comp, distress, zipScore: zipScore.toFixed(1), status, action, summary };
}

function generateWeeklySummary({ status, action, distress, demandRatio, sold, expired, domAvg, fast, dropPct, zipScore, opportunityBoost }) {
  if (status === 'Hot') {
    if (demandRatio > 0.6 && fast > 60)
      return 'Strong pending activity and fast sales confirm a seller-driven market. Expect full-price competition and limited investor discount opportunity.';
    if (sold > 8 && domAvg < 20)
      return 'Rapid sales velocity and low DOM confirm buyer demand is strong. Not ideal for below-market offers — monitor for market shifts.';
    return 'Above-average demand and strong weekly sales make this a retail market. Competition is high and negotiating room is limited.';
  }
  if (status === 'Distress') {
    if (expired > sold)
      return 'High inventory and rising failed listings indicate strong seller pressure. More listings are expiring than selling — this is a high-probability deal zone. Prioritize direct mail and outreach now.';
    if (dropPct > 3)
      return 'Significant price reductions and mounting distress signals indicate sellers are losing confidence. Strong negotiating position — allocate mail budget and begin making offers.';
    return 'High distress signals across multiple indicators. Motivated sellers are present and competition is low. This ZIP is a primary target for direct mail and off-market offers.';
  }
  if (status === 'Early Distress') {
    if (expired >= sold * 0.5)
      return 'Demand is weak and distress is beginning to rise. Expired listings are climbing relative to sales — this ZIP is entering an opportunity phase. Begin light outreach and monitor weekly.';
    return 'Demand is soft and early distress signals are appearing. This ZIP is transitioning — not yet a full attack zone but worth starting light outreach before competition arrives.';
  }
  if (status === 'Slow') {
    return 'Market is slow but distress has not materialized. Sellers are not yet motivated — hold marketing spend and revisit in 2–3 weeks. Watch for rising expired listings as an entry signal.';
  }
  // Stable
  if (demandRatio >= 0.35 && domAvg <= 40)
    return 'Balanced demand and moderate days on market indicate a stable ZIP. Limited investor opportunity at current conditions — keep monitoring.';
  if (expired > 3)
    return 'Mixed signals — moderate demand but expired listings are ticking up. A potential early distress signal. Watch closely for the trend to confirm direction.';
  return 'Market conditions are balanced this week. Continue tracking pending and expired counts for a clearer directional signal before committing resources.';
}

// ── STATUS / ACTION BADGE HELPERS ───────────────────────
function statusClass(s) {
  if (s === 'Hot')            return 'mkt-hot';
  if (s === 'Stable')         return 'mkt-stable';
  if (s === 'Early Distress') return 'mkt-early-distress';
  if (s === 'Distress')       return 'mkt-distress';
  return 'mkt-slow'; // Slow
}
function actionClass(a) {
  if (a === 'Watch / Retail')      return 'action-watch-retail';
  if (a === 'Watch')               return 'action-watch';
  if (a === 'Watch / Light Attack')return 'action-watch-light';
  if (a === 'ATTACK')              return 'action-attack';
  return 'action-avoid';
}
// Inline color for ranking table (status)
function statusStyle(s) {
  if (s === 'Hot')            return 'background:#D4EDDA;color:#155724';
  if (s === 'Stable')         return 'background:#D1ECF1;color:#0c5460';
  if (s === 'Early Distress') return 'background:#FFF3CD;color:#7a4f0a';
  if (s === 'Distress')       return 'background:#1a1a1a;color:#fff';
  return 'background:#e8e8e8;color:#555'; // Slow
}
// Inline color for ranking table (action)
function actionStyle(a) {
  if (a === 'Watch / Retail')       return 'background:#D4EDDA;color:#155724';
  if (a === 'Watch')                return 'background:#D1ECF1;color:#0c5460';
  if (a === 'Watch / Light Attack') return 'background:#FFF3CD;color:#7a4f0a';
  if (a === 'ATTACK')               return 'background:#1a1a1a;color:#fff';
  return 'background:#e8e8e8;color:#777'; // Avoid
}

function autoCalc() {
  const active    = parseFloat(document.getElementById('f-active').value)    || 0;
  const pending   = parseFloat(document.getElementById('f-pending').value)   || 0;
  const sold      = parseFloat(document.getElementById('f-sold').value)      || 0;
  const expired   = parseFloat(document.getElementById('f-expired').value)   || 0;
  const domAvg    = parseFloat(document.getElementById('f-dom-avg').value)   || 0;
  const fast      = parseFloat(document.getElementById('f-fast').value)      || 0;
  const lsr       = parseFloat(document.getElementById('f-lsr').value)       || 0;
  const dropAmt   = parseFloat(document.getElementById('f-drop-amt').value)  || 0;
  const listPrice = parseFloat(document.getElementById('f-list-price').value)|| 0;

  const c = calcWeeklyScore({ active, pending, sold, expired, domAvg, fast, lsr, dropAmt, listPrice });

  // Update hidden inputs (used in save)
  document.getElementById('f-demand').value   = c.demandRatio.toFixed(2);
  document.getElementById('f-drop-pct').value = c.dropPct.toFixed(2);
  document.getElementById('f-comp').value     = c.comp;
  document.getElementById('f-distress').value = c.distress;

  // Update display fields
  document.getElementById('f-demand-disp').textContent   = c.demandRatio.toFixed(2);
  document.getElementById('f-drop-pct-disp').textContent = c.dropPct.toFixed(1) + '%';
  document.getElementById('f-comp-disp').textContent     = c.comp + ' / 10';
  document.getElementById('f-distress-disp').textContent = c.distress;

  // Show weekly market read if any data entered
  const hasData = active > 0 || pending > 0 || sold > 0;
  const readEl = document.getElementById('weekly-market-read');
  if (readEl) readEl.style.display = hasData ? 'block' : 'none';

  if (hasData) {
    document.getElementById('mkt-zip-score').textContent = c.zipScore + ' / 10';

    const statusBadge = document.getElementById('mkt-status-badge');
    statusBadge.textContent = c.status;
    statusBadge.className = 'mkt-badge ' + statusClass(c.status);

    const actionBadge = document.getElementById('mkt-action-badge');
    actionBadge.textContent = c.action;
    actionBadge.className = 'mkt-badge ' + actionClass(c.action);

    document.getElementById('mkt-summary').textContent = c.summary;
  }
}

async function saveZip() {
  const zipKey = (document.getElementById('f-zip').value||'').trim();
  if (!zipKey) { alert('Enter a zip code'); return; }
  const isoDate = document.getElementById('f-date').value || new Date().toISOString().split('T')[0];
  const dateLabel = new Date(isoDate + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const active    = parseFloat(document.getElementById('f-active').value)||0;
  const pending   = parseFloat(document.getElementById('f-pending').value)||0;
  const sold      = parseFloat(document.getElementById('f-sold').value)||0;
  const expired   = parseFloat(document.getElementById('f-expired').value)||0;
  const dom       = parseFloat(document.getElementById('f-dom').value)||0;
  const domAvg    = parseFloat(document.getElementById('f-dom-avg').value)||0;
  const fast      = parseFloat(document.getElementById('f-fast').value)||0;
  const lsr       = parseFloat(document.getElementById('f-lsr').value)||0;
  const dropAmt   = parseFloat(document.getElementById('f-drop-amt').value)||0;
  const listPrice = parseFloat(document.getElementById('f-list-price').value)||0;
  const lowSale   = parseFloat(document.getElementById('f-low-sale').value)||0;
  const calc = calcWeeklyScore({ active, pending, sold, expired, domAvg, fast, lsr, dropAmt, listPrice });
  const entry = {
    date: dateLabel, isoDate,
    active, pending, sold, expired, dom, domAvg, fast, lsr,
    dropAmt, listPrice, lowSale,
    dropPct:   parseFloat(calc.dropPct.toFixed(2)),
    demand:    parseFloat(calc.demandRatio.toFixed(2)),
    comp:      calc.comp,
    zipScore:  calc.zipScore,
    status:    calc.status,
    action:    calc.action,
    distress:  calc.distress,
    summary:   calc.summary,
  };
  if (!db.zips[zipKey]) {
    db.zips[zipKey] = { history:[], role:'', distress:'Moderate', works:'', doesnt:'', notes:'' };
  }
  db.zips[zipKey].role     = document.getElementById('f-role').value;
  db.zips[zipKey].distress = calc.distress;
  db.zips[zipKey].works    = document.getElementById('f-works').value;
  db.zips[zipKey].doesnt   = document.getElementById('f-doesnt').value;
  db.zips[zipKey].notes    = document.getElementById('f-notes').value;
  db.zips[zipKey].history.push(entry);
  document.getElementById('f-zip').disabled = false;
  saveLocal();
  setSyncStatus('syncing');
  await upsertToSupabase(zipKey);
  toast('Zip saved!');
  showPage('dashboard');
}

async function deleteZip() {
  if (!editingZip) return;
  if (!confirm('Delete ' + editingZip + '? This cannot be undone.')) return;
  delete db.zips[editingZip];
  document.getElementById('f-zip').disabled = false;
  saveLocal();
  await deleteFromSupabase(editingZip);
  toast(editingZip + ' deleted');
  showPage('dashboard');
}

// ── SCORING ──────────────────────────────────────────────
function roleClass(role) {
  if (role==='High risk / high reward') return 'role-3';
  if (role==='Main focus') return 'role-1';
  if (role==='Clean flips') return 'role-4';
  return 'role-2';
}
function distressBadge(d) {
  if (d==='High') return '<span class="badge-distress">High distress</span>';
  if (d==='Low')  return '<span class="badge-low">Low distress</span>';
  return '<span class="badge-mod">Moderate</span>';

// ── RENDER ───────────────────────────────────────────────
function renderDashboard() {
  const grid = document.getElementById('zip-grid');
  const keys = Object.keys(db.zips);
  if (keys.length===0) {
    grid.innerHTML = '<div class="no-zips">No zip codes yet.<br>Tap + to add your first zip.</div>';
    return;
  }
  grid.innerHTML = keys.map(k => {
    const z = db.zips[k];
    const l = z.history[z.history.length-1];
    const score = l && l.zipScore ? parseFloat(l.zipScore) : 0;
    const prev = z.history.length>1 ? z.history[z.history.length-2] : null;
    const domChange = l&&prev ? l.dom - prev.dom : null;
    const domCls = domChange===null?'':domChange<0?'down':domChange>0?'up':'';
    return `<div class="zip-card" onclick="showPage('detail','${k}')">
      <div class="zip-card-top">
        <div><div class="zip-num">${k}</div><div style="margin-top:4px">${distressBadge(z.distress)}</div></div>
        <span class="zip-role ${roleClass(z.role)}">${z.role}</span>
      </div>
      ${l?`<div class="zip-metrics">
        <div class="metric-mini"><div class="metric-mini-label">Pending</div><div class="metric-mini-val">${l.pending}</div></div>
        <div class="metric-mini"><div class="metric-mini-label">Active</div><div class="metric-mini-val">${l.active}</div></div>
        <div class="metric-mini"><div class="metric-mini-label">Median DOM</div><div class="metric-mini-val ${domCls}">${l.dom}d</div></div>
        <div class="metric-mini"><div class="metric-mini-label">Price drop avg</div><div class="metric-mini-val warn">-${l.dropPct}%</div></div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar-label"><span>Weekly ZIP score</span><span>${score}/10</span></div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${score*10}%"></div></div>
      </div>`:'<div style="color:#bbb;font-size:12px;margin-top:8px">No data yet — tap to update</div>'}
      <div class="zip-updated">${l?'Updated '+l.date:'—'} &nbsp;·&nbsp; ${l&&l.status?l.status+' · '+l.action:z.history.length+' week'+(z.history.length!==1?'s':'')+' of data'}</div>
    </div>`;
  }).join('');
}

function renderRanking() {
  const keys = Object.keys(db.zips);
  if (keys.length===0) {
    document.getElementById('rank-table').innerHTML='<tr><td style="padding:2rem;color:#aaa;text-align:center">No zip codes added yet</td></tr>';
    document.getElementById('strat-bars').innerHTML='';

    return `<div class="strat-row">
      <div class="strat-zip" style="font-weight:700">${item.k}</div>
      <div class="strat-bar-track"><div class="strat-bar-fill" style="width:${pct}%;background:${colors[Math.min(i,4)]}"></div></div>
      <div class="strat-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function renderDetail(zipKey) {
  const z = db.zips[zipKey];
  if (!z) { showPage('dashboard'); return; }
  const l = z.history[z.history.length-1];
  const prev = z.history.length>1 ? z.history[z.history.length-2] : null;
  const score = l && l.zipScore ? parseFloat(l.zipScore) : 0;
  const works  = (z.works||'').split(',').map(s=>s.trim()).filter(Boolean);
  const doesnt = (z.doesnt||'').split(',').map(s=>s.trim()).filter(Boolean);
  const histRows = [...z.history].reverse().map((h,i) => `
    <div class="history-row">
      <span class="history-date" style="font-weight:${i===0?'600':'400'};color:${i===0?'#1a1a1a':'#888'}">${h.date}</span>
      <span class="history-val">${h.pending} pend</span>
      <span class="history-val">${h.sold||0} sold</span>
      <span class="history-val">${h.expired||0} expired</span>
      <span class="history-val">${h.dom}d DOM</span>
      <span class="history-val" style="color:#888">${h.status||'—'} · ${h.action||'—'}</span>
      ${i===0?'<span style="font-size:10px;color:#1e8449;font-weight:600">Latest</span>':''}
    </div>`).join('');

  document.getElementById('detail-content').innerHTML=`
    <div class="detail-header">
      <div>
        <div class="detail-zip">${zipKey}</div>
        <div class="detail-role">${z.role} &nbsp;·&nbsp; ${distressBadge(z.distress)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:28px;font-weight:700">${score}<span style="font-size:14px;color:#888">/10</span></div>
        <div style="font-size:11px;color:#888;margin-bottom:4px">Weekly ZIP score</div>
        ${l&&l.status?`<span class="mkt-badge ${statusClass(l.status)}" style="font-size:10px">${l.status}</span>`:'' }
        ${l&&l.action?`<span class="mkt-badge ${actionClass(l.action)}" style="font-size:10px;margin-top:4px;display:inline-block">${l.action}</span>`:''}
      </div>
    </div>
    ${l?`<div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Week of</div><div class="metric-value" style="font-size:14px;font-weight:600">${l.date}</div></div>
      <div class="metric-card"><div class="metric-label">Active listings</div><div class="metric-value">${l.active}</div></div>
      <div class="metric-card"><div class="metric-label">Pending</div><div class="metric-value">${l.pending}</div><div class="metric-sub">Demand ratio: ${l.active>0?(l.pending/l.active).toFixed(2):0}</div></div>
      <div class="metric-card"><div class="metric-label">Sold (7d)</div><div class="metric-value">${l.sold}</div></div>
      <div class="metric-card"><div class="metric-label">Expired / Cancelled (7d)</div><div class="metric-value ${(l.expired||0)>l.sold?'bad':'warn'}">${l.expired||0}</div></div>
      <div class="metric-card"><div class="metric-label">Median DOM</div><div class="metric-value ${l.dom<=21?'good':l.dom<=35?'warn':'bad'}">${l.dom}d</div><div class="metric-sub">Avg: ${l.domAvg}d</div></div>
      <div class="metric-card"><div class="metric-label">% sold in 0–30d</div><div class="metric-value ${l.fast>=60?'good':l.fast>=40?'warn':'bad'}">${l.fast}%</div></div>
      <div class="metric-card"><div class="metric-label">List-to-sale ratio</div><div class="metric-value ${l.lsr>=99?'good':l.lsr>=97?'warn':'bad'}">${l.lsr}%</div></div>
      <div class="metric-card"><div class="metric-label">Avg price drop</div><div class="metric-value warn">-$${(l.dropAmt||0).toLocaleString()}</div><div class="metric-sub">${l.dropPct>0?'-'+l.dropPct+'% avg':''}</div></div>
      <div class="metric-card"><div class="metric-label">Weekly demand ratio</div><div class="metric-value">${l.demand||'—'}</div></div>
      <div class="metric-card"><div class="metric-label">Competition score</div><div class="metric-value ${l.comp<=6?'good':l.comp<=8?'warn':'bad'}">${l.comp}/10</div></div>
      ${l.lowSale?`<div class="metric-card"><div class="metric-label">Low sale (distress)</div><div class="metric-value bad">$${l.lowSale.toLocaleString()}</div></div>`:''}
      ${prev?`<div class="metric-card"><div class="metric-label">DOM vs last week</div><div class="metric-value ${l.dom<prev.dom?'good':l.dom>prev.dom?'bad':''}">${l.dom<prev.dom?'▼ '+Math.abs(l.dom-prev.dom)+'d faster':l.dom>prev.dom?'▲ '+(l.dom-prev.dom)+'d slower':'No change'}</div></div>`:''}
      ${prev?`<div class="metric-card"><div class="metric-label">Pending vs last week</div><div class="metric-value ${l.pending>prev.pending?'good':l.pending<prev.pending?'bad':''}">${l.pending>prev.pending?'▲ '+(l.pending-prev.pending)+' more':l.pending<prev.pending?'▼ '+Math.abs(l.pending-prev.pending)+' less':'No change'}</div></div>`:''}
    </div>`:''}
    ${l&&l.zipScore?`<div class="market-read-card" style="margin-bottom:12px">
      <h3>📊 Weekly Market Read</h3>
      <div class="market-read-top">
        <div><div class="mkt-score">${l.zipScore} / 10</div><div class="mkt-score-label">Weekly ZIP score</div></div>
        <span class="mkt-badge ${statusClass(l.status)}">${l.status||'—'}</span>
        <span class="mkt-badge ${actionClass(l.action)}">${l.action||'—'}</span>
      </div>
      <div class="mkt-summary">${l.summary||''}</div>
    </div>`:''}
    <div style="background:#fffbf0;border:1px solid #f0e0b0;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#856404">
      💡 Tap <strong>Update this week's numbers</strong> to log new MLS data and refresh your weekly read.
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn-primary" onclick="editZip('${zipKey}')">Update this week's numbers</button>
    </div>
    ${works.length||doesnt.length?`<div class="section-card"><h3>Investor strategy</h3><div class="works-grid">
      ${works.length?`<div class="works-box green"><h4 class="green">What works</h4>${works.map(w=>`<div class="works-item">✓ ${w}</div>`).join('')}</div>`:''}
      ${doesnt.length?`<div class="works-box red"><h4 class="red">What doesn't</h4>${doesnt.map(w=>`<div class="works-item">✗ ${w}</div>`).join('')}</div>`:''}
    </div></div>`:''}
    ${z.history.length>0?`<div class="section-card"><h3>Weekly history (${z.history.length} updates)</h3>${histRows}</div>`:''}
    <div class="section-card">
      <h3>Notes</h3>
      <textarea class="notes-area" id="notes-ta">${z.notes||''}</textarea>
      <button class="save-notes-btn" onclick="saveNotes('${zipKey}')">Save notes</button>
    </div>`;
}

async function saveNotes(zipKey) {
  db.zips[zipKey].notes = document.getElementById('notes-ta').value;
  saveLocal();
  await updateNotesInSupabase(zipKey);
  const btn = document.querySelector('.save-notes-btn');
  btn.textContent = 'Saved!';
  setTimeout(() => btn.textContent = 'Save notes', 1500);
}

// ── INIT ────────────────────────────────────────────────
async function init() {
  loadLocal();
  renderDashboard();
  const { url, key } = getSbCreds();
  if (url && key) {
    const ok = initSupabase(url, key);
    if (ok) {
      setSyncStatus('syncing');
      await loadFromSupabase();
      setSyncStatus('connected');
      renderDashboard();
    }
  }
}

init();
</script>
</body>
</html>
